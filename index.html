<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MySkillSwapNow</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
font-family: Arial;
margin: 0;
background: #f5f7fb;
}

.app {
max-width: 420px;
margin: auto;
padding: 15px;
}

h1 {
text-align: center;
}

button {
width: 100%;
padding: 14px;
margin-top: 8px;
border-radius: 10px;
border: none;
font-weight: bold;
}

.red { background: red; color: white; }
.green { background: green; color: white; }
.black { background: black; color: white; }

.card {
background: white;
padding: 15px;
border-radius: 12px;
margin-top: 15px;
}

input, textarea, select {
width: 100%;
padding: 10px;
margin-top: 8px;
border-radius: 8px;
border: 1px solid #ccc;
}

.job {
border: 1px solid #ddd;
padding: 10px;
margin-top: 10px;
border-radius: 10px;
}

.chat {
height: 200px;
overflow-y: auto;
border: 1px solid #ddd;
padding: 10px;
margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="app">

<h1>MySkillSwapNow</h1>
<p id="locationStatus">Getting location...</p>

<button class="red" onclick="show('post')">I NEED HELP</button>
<button class="green" onclick="show('jobs')">I CAN HELP</button>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input id="email" value="test@test.com">
<input id="password" type="password" value="password123">
<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<p id="user"></p>
</div>

<!-- POST -->
<div id="post" class="card" style="display:none;">
<h3>Post Job</h3>
<input id="title" placeholder="Title">
<textarea id="desc"></textarea>
<input id="budget" type="number" value="80">
<button onclick="postJob()">Post Job</button>
</div>

<!-- JOBS -->
<div id="jobs" class="card" style="display:none;">
<h3>Jobs</h3>
<div id="jobList"></div>
</div>

<!-- CHAT -->
<div id="chat" class="card" style="display:none;">
<h3>Chat</h3>
<div class="chat" id="chatBox"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

<script>
const SUPABASE_URL = "https://szkbplrqutkedxylhruh.supabase.co";
const SUPABASE_KEY = "sb_publishable_RUItc0pMsVY3_QLEWM6vPA_dcRVcILg";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let currentJob = null;

function show(tab) {
document.getElementById("post").style.display = "none";
document.getElementById("jobs").style.display = "none";
document.getElementById("chat").style.display = "none";

document.getElementById(tab).style.display = "block";

if (tab === "jobs") loadJobs();
}

async function signup() {
let { data, error } = await client.auth.signUp({
email: email.value,
password: password.value
});

if (error) alert(error.message);
}

async function login() {
let { data, error } = await client.auth.signInWithPassword({
email: email.value,
password: password.value
});

if (error) alert(error.message);
else {
user = data.user;
document.getElementById("user").innerText = user.email;
}
}

async function postJob() {
if (!user) return alert("login first");

let { error } = await client.from("jobs").insert([{
title: title.value,
description: desc.value,
budget: budget.value,
posted_by: user.email,
status: "open"
}]);

if (error) alert(error.message);
else alert("posted");
}

async function loadJobs() {
let { data } = await client.from("jobs").select("*");

jobList.innerHTML = "";

data.forEach(j => {
jobList.innerHTML += `
<div class="job">
<b>${j.title}</b>
<p>${j.description}</p>
<p>$${j.budget}</p>

<button onclick="openChat('${j.id}')">Chat</button>
</div>
`;
});
}

function openChat(id) {
currentJob = id;
show("chat");
loadMessages();
}

async function loadMessages() {
let { data } = await client
.from("messages")
.select("*")
.eq("job_id", currentJob);

chatBox.innerHTML = "";

data.forEach(m => {
chatBox.innerHTML += `<p><b>${m.sender}</b>: ${m.message}</p>`;
});
}

async function send() {
if (!user) return alert("login");
if (!currentJob) return alert("select job");

await client.from("messages").insert([{
job_id: currentJob,
sender: user.email,
message: msg.value
}]);

msg.value = "";
loadMessages();
}

navigator.geolocation.getCurrentPosition(pos => {
document.getElementById("locationStatus").innerText = "Location active";
});

</script>
</body>
</html>
