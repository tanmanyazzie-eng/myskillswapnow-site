<!DOCTYPE html>
<html>
<head>
<title>MySkillSwapNow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
margin: 0;
font-family: Arial;
background: #f2f3f5;
}

.app {
max-width: 430px;
margin: auto;
padding: 15px;
}

.btn {
width: 100%;
padding: 20px;
border-radius: 15px;
font-size: 20px;
margin: 10px 0;
border: none;
color: white;
}

.need { background: red; }
.help { background: green; }

.card {
background: white;
padding: 15px;
border-radius: 15px;
margin-top: 10px;
}

input, textarea {
width: 100%;
padding: 10px;
margin: 5px 0;
border-radius: 10px;
border: 1px solid #ccc;
}

.job {
border: 1px solid #ddd;
padding: 10px;
margin-top: 10px;
border-radius: 10px;
}
</style>
</head>

<body>

<div class="app">

<h2>MySkillSwapNow</h2>

<button class="btn need" onclick="mode='need'">🟥 I NEED HELP</button>
<button class="btn help" onclick="mode='help'">🟩 I CAN HELP</button>

<div class="card">
<h3>Login</h3>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="post" class="card">
<h3>Post Job</h3>
<input id="title" placeholder="Describe help needed">
<textarea id="desc"></textarea>
<input id="budget" placeholder="budget">
<button onclick="postJob()">Post</button>
</div>

<div id="jobs" class="card">
<h3>Jobs</h3>
</div>

</div>

<script>

const supabase = supabase.createClient(
"https://szkbplrqutkedxylhruh.supabase.co",
"YOUR_PUBLISHABLE_KEY"
);

let user = null;
let mode = "home";

async function login() {
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data } = await supabase.auth.signInWithPassword({ email, password });
user = data.user;

alert("Logged in");
}

async function postJob() {
const title = document.getElementById("title").value;
const desc = document.getElementById("desc").value;
const budget = document.getElementById("budget").value;

await supabase.from("jobs").insert([
{ title, description: desc, budget }
]);

loadJobs();
}

async function loadJobs() {
const { data } = await supabase.from("jobs").select("*");

const container = document.getElementById("jobs");
container.innerHTML = "<h3>Jobs</h3>";

data.forEach(job => {
container.innerHTML += `
<div class="job">
<b>${job.title}</b>
<p>${job.description}</p>
<p>$${job.budget}</p>
</div>
`;
});
}

loadJobs();

</script>

</body>
</html>
