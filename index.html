<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MySkillSwapNow</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#e6e6e6;
color:#222;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin:0;
font-size:36px;
letter-spacing:2px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input, textarea, select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:black;
color:white;
border:none;
padding:14px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#333;
}

.skill{
border-bottom:1px solid #eee;
padding:10px 0;
}

.skill:last-child{
border-bottom:none;
}

</style>
</head>

<body>

<header>
<h1>MySkillSwapNow</h1>
<p>Trade skills. Get help. Make money.</p>
</header>

<div class="container">

<div class="card">
<h2>Create Request</h2>

<input id="title" placeholder="What do you need help with? (ex: Hang TV)"/>

<textarea id="description" placeholder="Describe the job"></textarea>

<select id="category">
<option>Home Help</option>
<option>Yard Work</option>
<option>Moving Help</option>
<option>Cleaning</option>
<option>Tutoring</option>
</select>

<input id="budget" placeholder="Budget $" />

<button onclick="postSkill()">Post Job</button>

</div>

<div class="card">
<h2>Available Jobs</h2>
<div id="skills"></div>
</div>

</div>

<script>

let skills=[];

function postSkill(){

const title=document.getElementById("title").value;
const description=document.getElementById("description").value;
const category=document.getElementById("category").value;
const budget=document.getElementById("budget").value;

if(!title){
alert("Enter job title");
return;
}

const job={
title,
description,
category,
budget
};

skills.push(job);

renderJobs();

document.getElementById("title").value="";
document.getElementById("description").value="";
document.getElementById("budget").value="";
}

function renderJobs(){

const list=document.getElementById("skills");
list.innerHTML="";

skills.forEach((job)=>{

const div=document.createElement("div");
div.className="skill";

div.innerHTML=`
<h3>${job.title}</h3>
<p>${job.description}</p>
<p><strong>Category:</strong> ${job.category}</p>
<p><strong>Budget:</strong> $${job.budget}</p>
<button onclick="alert('Messaging will require subscription after 2 messages.')">Message</button>
`;

list.appendChild(div);

});

}

</script>

</body>
</html>
