<!DOCTYPE html>
<html>
<head>
<title>MySkillSwapNow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:Arial; background:#f2f3f5; }
.app { max-width:430px; margin:auto; padding:15px; }
h2 { text-align:center; }

.btn {
width:100%;
padding:20px;
border-radius:15px;
font-size:20px;
margin:10px 0;
border:none;
color:white;
font-weight:bold;
}

.need { background:#d62828; }
.help { background:#16803c; }

.card {
background:white;
padding:15px;
border-radius:15px;
margin-top:12px;
box-shadow:0 4px 14px #0001;
}

input, textarea, select {
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
}

.job {
border:1px solid #ddd;
padding:12px;
margin-top:10px;
border-radius:12px;
}

.urgent {
border:2px solid red;
background:#fff5f5;
}

.badge {
background:red;
color:white;
padding:4px 8px;
border-radius:8px;
font-size:12px;
margin-left:8px;
}

.hidden { display:none; }
</style>
</head>

<body>
<div class="app">

<h2>MySkillSwapNow</h2>
<p id="status">Loading...</p>

<button class="btn need" onclick="showNeed()">🟥 I NEED HELP</button>
<button class="btn help" onclick="showHelp()">🟩 I CAN HELP</button>

<div class="card">
<h3>Login</h3>
<input id="email" value="test@test.com">
<input id="password" type="password" value="password123">
<button onclick="login()">Login</button>
</div>

<div id="needSection" class="card hidden">
<h3>Post Job</h3>

<input id="title" placeholder="Describe help needed">
<textarea id="description"></textarea>

<select id="urgency">
<option value="normal">Normal</option>
<option value="urgent">🚨 HELP NOW</option>
</select>

<select id="payment_type">
<option>Cash Only</option>
<option>Credits Only</option>
<option>Cash or Credits</option>
</select>

<select id="category">
<option>General Labor</option>
<option>Electrical</option>
<option>Moving</option>
</select>

<input id="budget" type="number" value="80">

<button onclick="postJob()">Post Job</button>
</div>

<div id="helpSection" class="card hidden">
<h3>Jobs Near You</h3>

<label>Distance: <span id="radiusText">25</span> miles</label>
<input id="radius" type="range" min="1" max="100" value="25" oninput="updateRadius()">

<div id="jobs"></div>
</div>

</div>

<script>
const client = supabase.createClient(
"https://szkbplrqutkedxylhruh.supabase.co",
"sb_publishable_RUItc0pMsVY3_QLEWM6vPA_dcRVcILg"
);

let user = null;
let myLat = null;
let myLng = null;
let jobs = [];

function showNeed() {
document.getElementById("needSection").classList.remove("hidden");
document.getElementById("helpSection").classList.add("hidden");
}

function showHelp() {
document.getElementById("helpSection").classList.remove("hidden");
document.getElementById("needSection").classList.add("hidden");
loadJobs();
}

function updateRadius() {
document.getElementById("radiusText").innerText = document.getElementById("radius").value;
renderJobs();
}

function getDistance(a,b,c,d){
if(!a||!b||!c||!d)return null;
let R=3958.8;
let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

navigator.geolocation.getCurrentPosition(p=>{
myLat=p.coords.latitude;
myLng=p.coords.longitude;
document.getElementById("status").innerText="Location active ✅";
});

async function login(){
let email=emailEl.value;
let password=passwordEl.value;
let res=await client.auth.signInWithPassword({email,password});
user=res.data.user;
}

async function postJob(){
if(!user) return alert("login first");

await client.from("jobs").insert([{
title:title.value,
description:description.value,
budget:Number(budget.value),
payment_type:payment_type.value,
category:category.value,
urgency:urgency.value,
posted_by:user.email,
lat:myLat,
lng:myLng,
status:"open"
}]);

showHelp();
}

async function loadJobs(){
let res=await client.from("jobs")
.select("*")
.eq("status","open");

jobs=res.data||[];
renderJobs();
}

function renderJobs(){
let radius=Number(radiusEl.value);
jobs.sort((a,b)=> b.urgency==="urgent" ? 1 : -1);

jobsEl.innerHTML="";

jobs.forEach(j=>{
let d=getDistance(myLat,myLng,j.lat,j.lng);
if(d && d>radius) return;

jobsEl.innerHTML+=`
<div class="job ${j.urgency==="urgent"?"urgent":""}">
<b>${j.title}</b>
${j.urgency==="urgent"?'<span class="badge">HELP NOW</span>':''}
<p>${j.description}</p>
<p>$${j.budget}</p>
<p>${j.category}</p>
<p>${j.payment_type}</p>
</div>
`;
});
}

let emailEl=document.getElementById("email");
let passwordEl=document.getElementById("password");
let title=document.getElementById("title");
let description=document.getElementById("description");
let budget=document.getElementById("budget");
let category=document.getElementById("category");
let payment_type=document.getElementById("payment_type");
let urgency=document.getElementById("urgency");
let jobsEl=document.getElementById("jobs");
let radiusEl=document.getElementById("radius");

loadJobs();
</script>

</body>
</html>
