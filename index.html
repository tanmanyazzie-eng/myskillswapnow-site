<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f2f3f5; }
.app { max-width:430px; margin:auto; padding:16px; }

h2 { text-align:center; }

.tabs {
display:flex;
justify-content:space-between;
margin:10px 0;
}

.tabs button {
flex:1;
margin:4px;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
}

.active { background:#333; color:white; }

.card {
background:white;
padding:14px;
border-radius:14px;
margin-top:12px;
box-shadow:0 4px 12px #0001;
}

input, textarea, select {
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
}

.job {
border:1px solid #ddd;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.chatBox {
max-height:200px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="app">

<h2>MySkillSwapNow</h2>

<div class="tabs">
<button onclick="setTab('home')" id="homeTab">Home</button>
<button onclick="setTab('jobs')" id="jobsTab">Jobs</button>
<button onclick="setTab('chat')" id="chatTab">Chat</button>
<button onclick="setTab('track')" id="trackTab">Track</button>
</div>

<!-- LOGIN -->
<div id="home" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h3>Post Job</h3>
<input id="title" placeholder="Job title">
<textarea id="desc"></textarea>
<select id="payment">
<option>Cash</option>
<option>Credits</option>
</select>
<input id="budget" placeholder="Budget">
<button onclick="postJob()">Post</button>
</div>

<!-- JOBS -->
<div id="jobs" class="card" style="display:none;">
<h3>Jobs</h3>
<div id="jobList"></div>
</div>

<!-- CHAT -->
<div id="chat" class="card" style="display:none;">
<h3>Chat</h3>
<div class="chatBox" id="chatBox"></div>
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</div>

<!-- TRACK -->
<div id="track" class="card" style="display:none;">
<h3>Tracking</h3>
<button onclick="updateLocation()">Update My Location</button>
<div id="trackInfo"></div>
</div>

</div>

<script>

const client = supabase.createClient(
"https://szkbplrqutkedxylhruh.supabase.co",
"sb_publishable_RUItc0pMsVY3_QLEWM6vPA_dcRVcILg"
);

let user = null;
let currentJob = null;

function setTab(tab){
document.querySelectorAll('.card').forEach(x=>x.style.display="none");
document.getElementById(tab).style.display="block";
}

async function login(){
let email = email.value;
let password = password.value;

let res = await client.auth.signInWithPassword({email,password});
user = res.data.user;
alert("Logged in");
}

async function postJob(){
let job = {
title:title.value,
description:desc.value,
budget:budget.value,
payment_type:payment.value,
posted_by:user?.email
};

await client.from("jobs").insert([job]);
loadJobs();
}

async function loadJobs(){
let res = await client.from("jobs").select("*");
let list = document.getElementById("jobList");
list.innerHTML="";

res.data.forEach(j=>{
list.innerHTML+=`
<div class="job">
<b>${j.title}</b>
<p>${j.description}</p>
<p>$${j.budget}</p>
<button onclick="openChat('${j.id}')">Chat</button>
<button onclick="acceptJob('${j.id}')">Accept</button>
</div>`;
});
}

async function acceptJob(id){
currentJob = id;

await client.from("jobs")
.update({accepted_by:user.email})
.eq("id",id);

alert("Job accepted");
}

function openChat(jobId){
currentJob = jobId;
setTab("chat");
loadChat();
}

async function sendMsg(){
let text = msg.value;

await client.from("messages").insert([{
job_id:currentJob,
sender:user.email,
message:text
}]);

msg.value="";
loadChat();
}

async function loadChat(){
let res = await client
.from("messages")
.select("*")
.eq("job_id",currentJob);

let box = document.getElementById("chatBox");
box.innerHTML="";

res.data.forEach(m=>{
box.innerHTML+=`<p><b>${m.sender}:</b> ${m.message}</p>`;
});
}

async function updateLocation(){
navigator.geolocation.getCurrentPosition(async pos=>{
let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

await client.from("tracking").insert([{
job_id:currentJob,
helper_email:user.email,
lat,
lng
}]);

document.getElementById("trackInfo").innerText =
"Location updated: " + lat.toFixed(3)+", "+lng.toFixed(3);
});
}

loadJobs();

</script>

</body>
</html>
